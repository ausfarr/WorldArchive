<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Setup — Step 1 — The Archive</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <div class="site-title"><a href="index.html">The <span class="accent">Archive</span></a></div>
    <div style="display:flex; align-items:center; gap:16px;">
      <a href="#" onclick="startOverWizard(); return false;" style="font-family: var(--font-mono); font-size: 0.68rem; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.04em;">Start Over</a>
      <div id="auth-status" style="font-family: var(--font-mono); font-size: 0.72rem;"></div>
    </div>
  </div>
</header>

<div class="wrap" style="max-width: 640px; padding-top: 40px; padding-bottom: 80px;">

  <p class="crumb" style="padding: 0 0 18px;">World Setup <span class="sep">/</span> Step 1 of 8 <span class="sep">/</span> Seed &amp; Vision</p>

  <div class="sheet" style="padding: 32px;">
    <h1 style="font-family: var(--font-display); text-transform: uppercase; font-size: 1.4rem; margin: 0 0 6px;">Seed &amp; Vision</h1>
    <p style="color: var(--ink-dim); font-size: 0.9rem; margin: 0 0 28px;">The broad strokes — genre, scale, and the core tension that will drive everything generated later. Nothing here is final; you can change any of this later.</p>

    <form id="step1-form">

      <div class="field-group">
        <label class="field-label">Genre &amp; Tone</label>
        <div id="genre-checklist" class="checklist"></div>
      </div>

      <div class="field-group">
        <label class="field-label">Scale</label>
        <select id="scale" class="field-input"></select>
      </div>

      <div class="field-group">
        <label class="field-label">Era / Tech Level</label>
        <select id="era" class="field-input"></select>
      </div>

      <div class="field-group">
        <label class="field-label">Supernatural / Speculative System</label>
        <label style="display:flex; align-items:center; gap:8px; font-size:0.85rem; color: var(--ink-dim); margin-bottom: 8px;">
          <input type="checkbox" id="has-supernatural"> This world has one
        </label>
        <textarea id="supernatural-system" class="field-input" rows="2" placeholder="e.g. a toxic atmospheric contaminant that slowly rewrites anything it touches" style="display:none;"></textarea>
      </div>

      <hr style="border: none; border-top: 1px solid var(--border-line-soft); margin: 28px 0;">

      <div class="field-group">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <label class="field-label" style="margin-bottom:0;">Core Tension</label>
          <button type="button" class="generate-btn" data-target="all">Generate for me</button>
        </div>
        <textarea id="core-tension" class="field-input" rows="2" placeholder="The standing conflict or pressure that drives this world's stories."></textarea>
      </div>

      <div class="field-group">
        <label class="field-label">Inspirations</label>
        <textarea id="inspirations" class="field-input" rows="2" placeholder="3-5 real touchstones — books, games, films, historical eras."></textarea>
      </div>

      <div class="field-group">
        <label class="field-label">Non-Negotiables</label>
        <textarea id="non-negotiables" class="field-input" rows="2" placeholder="A hard rule or tone boundary later content should never violate."></textarea>
      </div>

      <p id="status" style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--ink-faint); min-height: 1.2em; margin: 8px 0 24px;"></p>

      <div style="display:flex; justify-content:flex-end; gap:12px;">
        <button type="submit" class="primary-btn">Save &amp; Continue →</button>
      </div>
    </form>
  </div>
</div>

<footer class="site-footer">
  <div class="wrap">ECHOES OF THE NEON — INTERNAL ARCHIVE BUILD</div>
</footer>

<style>
  .field-group { margin-bottom: 22px; }
  .field-label {
    display: block; font-family: var(--font-mono); font-size: 0.7rem;
    letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-faint);
    margin-bottom: 6px;
  }
  .field-hint { font-size: 0.75rem; color: var(--ink-faint); margin: 4px 0 0; }
  .field-input {
    width: 100%; background: var(--bg-panel-raised); border: 1px solid var(--border-line);
    color: var(--ink); padding: 10px 12px; font-family: var(--font-body); font-size: 0.92rem;
  }
  textarea.field-input { resize: vertical; }
  .primary-btn {
    background: var(--neon-primary); color: var(--bg-void); border: none;
    padding: 12px 24px; font-family: var(--font-display); text-transform: uppercase;
    letter-spacing: 0.04em; cursor: pointer; font-weight: 600;
  }
  .generate-btn {
    background: none; border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
    padding: 5px 10px; font-family: var(--font-mono); font-size: 0.68rem;
    text-transform: uppercase; letter-spacing: 0.04em; cursor: pointer;
  }
  .generate-btn:disabled { opacity: 0.5; cursor: default; }
  .checklist {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 8px 16px;
  }
  .checklist label {
    display: flex; align-items: center; gap: 8px; font-size: 0.88rem;
    color: var(--ink); cursor: pointer;
  }
  .checklist input[type="checkbox"] { accent-color: var(--neon-primary); }
</style>

<script src="/config.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/wizardSession.js"></script>
<script>
const GENRE_OPTIONS = ["Fantasy", "Sci-Fi", "Post-Apocalyptic", "Horror", "Urban Fantasy", "Historical", "Cyberpunk", "Steampunk", "Grimdark", "Hopepunk", "Noir", "Mythic"];
const SCALE_OPTIONS = ["Single City/Settlement", "Regional", "Continental", "Global", "Multiverse"];
const ERA_OPTIONS = ["Pre-Industrial", "Industrial", "Modern", "Near-Future", "Far-Future", "Post-Collapse"];

function populateSelect(el, options) {
  el.innerHTML = options.map(o => `<option value="${o}">${o}</option>`).join("");
}

function populateChecklist(el, options) {
  el.innerHTML = options.map((o, i) => `
    <label>
      <input type="checkbox" value="${o}" id="genre-opt-${i}">
      ${o}
    </label>
  `).join("");
}

function getCheckedValues(el) {
  return Array.from(el.querySelectorAll("input[type=checkbox]:checked")).map(cb => cb.value);
}

function setCheckedValues(el, values) {
  if (!values) return;
  const set = new Set(Array.isArray(values) ? values : [values]);
  Array.from(el.querySelectorAll("input[type=checkbox]")).forEach(cb => {
    cb.checked = set.has(cb.value);
  });
}

async function init() {
  await requireAuth();
  renderAuthStatus();
  await ensureWizardSession();

  populateChecklist(document.getElementById("genre-checklist"), GENRE_OPTIONS);
  populateSelect(document.getElementById("scale"), SCALE_OPTIONS);
  populateSelect(document.getElementById("era"), ERA_OPTIONS);

  // Load any previously-saved draft for this step.
  try {
    const res = await authFetch("/api/wizard/draft");
    const { draft } = await res.json();
    const step1 = (draft && draft["1"]) || {};
    setCheckedValues(document.getElementById("genre-checklist"), step1.genre);
    if (step1.scale) document.getElementById("scale").value = step1.scale;
    if (step1.era) document.getElementById("era").value = step1.era;
    if (step1.supernaturalSystem) {
      document.getElementById("has-supernatural").checked = true;
      document.getElementById("supernatural-system").style.display = "block";
      document.getElementById("supernatural-system").value = step1.supernaturalSystem;
    }
    if (step1.coreTension) document.getElementById("core-tension").value = step1.coreTension;
    if (step1.inspirations) document.getElementById("inspirations").value = step1.inspirations;
    if (step1.nonNegotiables) document.getElementById("non-negotiables").value = step1.nonNegotiables;
  } catch (err) {
    console.error("Could not load existing draft:", err);
  }
}

document.getElementById("has-supernatural").addEventListener("change", (e) => {
  document.getElementById("supernatural-system").style.display = e.target.checked ? "block" : "none";
});

document.querySelector(".generate-btn").addEventListener("click", async (e) => {
  const btn = e.target;
  const status = document.getElementById("status");
  btn.disabled = true;
  status.textContent = "Generating suggestions…";
  try {
    const body = {
      genre: getCheckedValues(document.getElementById("genre-checklist")).join(", "),
      scale: document.getElementById("scale").value,
      era: document.getElementById("era").value,
      supernaturalSystem: document.getElementById("has-supernatural").checked
        ? document.getElementById("supernatural-system").value
        : null
    };
    const res = await authFetch("/api/wizard/generate-step1", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || "Generation failed.");
    }
    const suggestions = await res.json();
    document.getElementById("core-tension").value = suggestions.coreTension || "";
    document.getElementById("inspirations").value = suggestions.inspirations || "";
    document.getElementById("non-negotiables").value = suggestions.nonNegotiables || "";
    status.textContent = "Suggestions filled in below — edit freely before continuing.";
  } catch (err) {
    status.textContent = "Error: " + err.message;
  } finally {
    btn.disabled = false;
  }
});

document.getElementById("step1-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const status = document.getElementById("status");
  status.textContent = "Saving…";
  const fields = {
    genre: getCheckedValues(document.getElementById("genre-checklist")),
    scale: document.getElementById("scale").value,
    era: document.getElementById("era").value,
    supernaturalSystem: document.getElementById("has-supernatural").checked
      ? document.getElementById("supernatural-system").value
      : null,
    coreTension: document.getElementById("core-tension").value,
    inspirations: document.getElementById("inspirations").value,
    nonNegotiables: document.getElementById("non-negotiables").value
  };
  try {
    const res = await authFetch("/api/wizard/save-draft", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ step: 1, fields })
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || "Save failed.");
    }
    status.textContent = "Saved — continuing…";
    window.location.href = "wizard-lore.html";
  } catch (err) {
    status.textContent = "Error: " + err.message;
  }
});

init();
</script>

</body>
</html>
