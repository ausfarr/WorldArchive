<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Setup — Stat System — The Archive</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <div class="site-title"><a href="index.html">The <span class="accent">Archive</span></a></div>
    <div style="display:flex; align-items:center; gap:16px;">
      <a href="#" onclick="startOverWizard(); return false;" style="font-family: var(--font-mono); font-size: 0.68rem; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.04em;">Start Over</a>
      <div id="auth-status" style="font-family: var(--font-mono); font-size: 0.72rem;"></div>
    </div>
  </div>
</header>

<div class="wrap" style="max-width: 680px; padding-top: 40px; padding-bottom: 80px;">

  <p class="crumb" style="padding: 0 0 18px;">World Setup <span class="sep">/</span> Step 5 of 8 <span class="sep">/</span> Stat System</p>

  <a href="wizard-factions.html" style="display:inline-block; margin-bottom:16px; font-family: var(--font-mono); font-size: 0.75rem; color: var(--ink-dim);">← Back to Factions</a>

  <div class="sheet" style="padding: 32px;">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 6px;">
      <h1 style="font-family: var(--font-display); text-transform: uppercase; font-size: 1.4rem; margin: 0;">Stat System</h1>
      <button type="button" id="generate-all" class="generate-btn">Generate for me</button>
    </div>
    <p style="color: var(--ink-dim); font-size: 0.9rem; margin: 0 0 24px;">Rename the six core attributes to fit your world's own voice. The underlying mechanics never change — this is labeling only.</p>

    <div id="stats-list"></div>

    <p id="status" style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--ink-faint); min-height: 1.2em; margin: 16px 0;"></p>

    <div style="display:flex; justify-content:flex-end; margin-top: 24px;">
      <button type="button" id="save-stats" class="primary-btn">Save &amp; Continue →</button>
    </div>
  </div>
</div>

<footer class="site-footer">
  <div class="wrap">ECHOES OF THE NEON — INTERNAL ARCHIVE BUILD</div>
</footer>

<style>
  .primary-btn {
    background: var(--neon-primary); color: var(--bg-void); border: none;
    padding: 12px 24px; font-family: var(--font-display); text-transform: uppercase;
    letter-spacing: 0.04em; cursor: pointer; font-weight: 600;
  }
  .primary-btn:disabled { opacity: 0.5; cursor: default; }
  .generate-btn {
    background: none; border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
    padding: 8px 14px; font-family: var(--font-mono); font-size: 0.7rem;
    text-transform: uppercase; letter-spacing: 0.04em; cursor: pointer;
  }
  .generate-btn:disabled { opacity: 0.5; cursor: default; }
  .field-input {
    width: 100%; background: var(--bg-panel-raised); border: 1px solid var(--border-line);
    color: var(--ink); padding: 10px 12px; font-family: var(--font-body); font-size: 0.92rem;
  }
  .stat-card {
    background: var(--bg-panel-raised); border: 1px solid var(--border-line);
    padding: 16px 18px; margin-bottom: 14px; display: grid; grid-template-columns: 100px 1fr; gap: 14px; align-items: start;
  }
  .stat-canon {
    font-family: var(--font-mono); font-size: 0.75rem; color: var(--ink-faint);
    text-transform: uppercase; letter-spacing: 0.05em; padding-top: 10px;
  }
  .stat-mechanic { display: block; font-size: 0.62rem; color: var(--ink-faint); text-transform: none; letter-spacing: 0; margin-top: 4px; line-height: 1.4; }
  .stat-label-input { font-family: var(--font-display); text-transform: uppercase; margin-bottom: 8px; }
</style>

<script src="/config.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/wizardSession.js"></script>
<script>
const CANONICAL_STATS = [
  { key: "body", mechanic: "Drives max health & physical resilience" },
  { key: "reflex", mechanic: "Drives dodge chance, accuracy, move speed" },
  { key: "knowledge", mechanic: "Drives max energy & skill-based effects" },
  { key: "presence", mechanic: "Drives buff/debuff potency" },
  { key: "sanity", mechanic: "Contributes to max health, resistance to breaking" },
  { key: "fate", mechanic: "Drives crit chance & max energy" }
];

let statSystem = {};

function render() {
  document.getElementById("stats-list").innerHTML = CANONICAL_STATS.map(({ key, mechanic }) => {
    const s = statSystem[key] || {};
    return `
      <div class="stat-card" data-key="${key}">
        <div class="stat-canon">${key}<span class="stat-mechanic">${mechanic}</span></div>
        <div>
          <input class="field-input stat-label-input" placeholder="Label" value="${(s.label || "").replace(/"/g, "&quot;")}">
          <textarea class="field-input stat-desc-input" rows="2" placeholder="One-line flavor description">${s.description || ""}</textarea>
        </div>
      </div>
    `;
  }).join("");
}

function syncFromDOM() {
  document.querySelectorAll(".stat-card").forEach((card) => {
    const key = card.dataset.key;
    statSystem[key] = {
      label: card.querySelector(".stat-label-input").value,
      description: card.querySelector(".stat-desc-input").value
    };
  });
}

document.getElementById("generate-all").addEventListener("click", async () => {
  const btn = document.getElementById("generate-all");
  const status = document.getElementById("status");
  btn.disabled = true;
  status.textContent = "Generating…";
  try {
    const res = await authFetch("/api/wizard/generate-stat-system", { method: "POST" });
    if (!res.ok) { const err = await res.json(); throw new Error(err.error || "Generation failed."); }
    const data = await res.json();
    statSystem = data.statSystem;
    render();
    status.textContent = "Generated — edit freely before saving.";
  } catch (err) {
    status.textContent = "Error: " + err.message;
  } finally {
    btn.disabled = false;
  }
});

document.getElementById("save-stats").addEventListener("click", async () => {
  syncFromDOM();
  const status = document.getElementById("status");
  const btn = document.getElementById("save-stats");
  btn.disabled = true;
  status.textContent = "Saving…";
  try {
    const res = await authFetch("/api/wizard/save-stat-system", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ statSystem })
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.error || "Save failed."); }
    status.textContent = "Saved. (Step 6 — Style Guide — isn't built yet, this is as far as the wizard goes for now.)";
  } catch (err) {
    status.textContent = "Error: " + err.message;
  } finally {
    btn.disabled = false;
  }
});

async function init() {
  await requireAuth();
  renderAuthStatus();
  await ensureWizardSession();
  try {
    const res = await authFetch("/api/wizard/stat-system");
    const { statSystem: loaded } = await res.json();
    statSystem = loaded || {};
  } catch (err) {
    console.error("Could not load existing stat system:", err);
  }
  render();
}

init();
</script>

</body>
</html>
