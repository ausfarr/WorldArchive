<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestiary — The Archive</title>
<link rel="stylesheet" href="../css/style.css">
<script>
(function() {
  try {
    var cached = localStorage.getItem('worldforge_theme_cache');
    if (!cached) return;
    var t = JSON.parse(cached);
    var hex = /^#[0-9a-fA-F]{6}$/;
    var overrides = [];
    if (hex.test(t.backgroundColor)) overrides.push('--bg-void: ' + t.backgroundColor + ';');
    if (hex.test(t.panelColor)) overrides.push('--bg-panel: ' + t.panelColor + '; --bg-panel-raised: ' + t.panelColor + ';');
    if (hex.test(t.inkColor)) overrides.push('--ink: ' + t.inkColor + ';');
    if (hex.test(t.primaryColor)) overrides.push('--neon-primary: ' + t.primaryColor + ';');
    if (hex.test(t.secondaryColor)) overrides.push('--neon-cyan: ' + t.secondaryColor + ';');
    var fontCss = '';
    if (t.fontDisplay) {
      var l1 = document.createElement('link');
      l1.rel = 'stylesheet';
      l1.href = 'https://fonts.googleapis.com/css2?family=' + encodeURIComponent(t.fontDisplay).replace(/%20/g, '+') + ':wght@400;600;700&display=swap';
      document.head.appendChild(l1);
      fontCss += "h1, h2, .site-title { font-family: '" + t.fontDisplay + "', sans-serif; }\n";
    }
    if (t.fontBody) {
      var l2 = document.createElement('link');
      l2.rel = 'stylesheet';
      l2.href = 'https://fonts.googleapis.com/css2?family=' + encodeURIComponent(t.fontBody).replace(/%20/g, '+') + ':wght@400;500;600&display=swap';
      document.head.appendChild(l2);
      fontCss += "body { font-family: '" + t.fontBody + "', sans-serif; }\n";
    }
    var styleTag = document.createElement('style');
    styleTag.id = 'world-theme-cached';
    styleTag.textContent = ':root { ' + overrides.join(' ') + ' }\n' + fontCss;
    document.head.appendChild(styleTag);
  } catch (e) { /* no cache yet, or malformed -- fall back to default theme, async apply will fix it */ }
})();
</script>

</head>
<body data-category="enemies">

<header class="site-header">
  <div class="wrap">
    <div class="site-title"><a href="../index.html">The <span class="accent">Archive</span></a></div>
    <nav class="site-nav">
      <a href="../factions/index.html" id="nav-factions">Factions</a>
      <a href="../npcs/index.html" id="nav-npcs">NPCs</a>
      <a href="../enemies/index.html" id="nav-enemies">Bestiary</a>
      <a href="../classes/index.html" id="nav-classes">Classes</a>
      <a href="../items/index.html" id="nav-items">Items</a>
      <a href="../logs/index.html" id="nav-logs">Logs</a>
      <a href="../survivors/index.html" id="nav-survivors">Survivors</a>
      <span id="auth-status" style="font-family: var(--font-mono); font-size: 0.72rem;"></span>
    </nav>
  </div>
</header>

<div class="wrap">
  <div class="crumb"><a href="../index.html">Archive</a><span class="sep">/</span><span id="crumb-label">Bestiary</span></div>
  <h1 style="font-family: var(--font-display); text-transform: uppercase; margin: 20px 0 8px;" id="page-title">Bestiary</h1>
  <p style="color: var(--ink-dim); max-width: 640px; margin: 0 0 24px;">Trash, Elite, and Boss-tier threats. Stat blocks, ability kits, combat notes.</p>

  
<div class="sheet" style="margin: 0 0 40px; padding: 24px 32px;">
  <p class="sheet-eyebrow" style="margin: 0 0 8px;">Generate New Entry</p>
  <form id="gen-form" style="display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;">
    <div style="flex: 1; min-width: 160px;">
      <label for="gen-name" style="display:block; font-family: var(--font-mono); font-size: 0.7rem; color: var(--ink-faint); margin-bottom: 4px;">NAME (optional)</label>
      <input id="gen-name" type="text" placeholder="leave blank to generate" style="width: 100%; background: var(--bg-panel-raised); border: 1px solid var(--border-line); color: var(--ink); padding: 8px 10px; font-family: var(--font-body);">
    </div>
    <div style="flex: 1; min-width: 160px;">
      <label for="gen-field-2" style="display:block; font-family: var(--font-mono); font-size: 0.7rem; color: var(--ink-faint); margin-bottom: 4px;">TIER</label>
      <select id="gen-field-2" style="width: 100%; background: var(--bg-panel-raised); border: 1px solid var(--border-line); color: var(--ink); padding: 8px 10px;">
        <option value="">Let it choose</option>
        <option>Trash</option>
        <option>Elite</option>
        <option>Boss</option>
      </select>
    </div>
    <div style="flex: 1; min-width: 160px;">
      <label for="gen-field-3" style="display:block; font-family: var(--font-mono); font-size: 0.7rem; color: var(--ink-faint); margin-bottom: 4px;">FACTION</label>
      <select id="gen-field-3" style="width: 100%; background: var(--bg-panel-raised); border: 1px solid var(--border-line); color: var(--ink); padding: 8px 10px;">
        <option value="">Let it choose</option>
        <option value="glitch_kin">Glitch-Kin</option>
        <option value="preservation">The Preservation</option>
        <option value="ferro_kings">The Ferro-Kings</option>
        <option value="the_board">The Board</option>
      </select>
    </div>
    <button type="submit" id="gen-submit" style="background: var(--neon-primary); color: var(--bg-void); border: none; padding: 10px 20px; font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.04em; cursor: pointer; font-weight: 600;">Generate Enemy</button>
  </form>
  <p id="gen-status" style="font-family: var(--font-mono); font-size: 0.75rem; color: var(--ink-faint); margin: 12px 0 0; display: none;"></p>
</div>
<script>
document.getElementById('gen-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('gen-submit');
  const status = document.getElementById('gen-status');
  btn.disabled = true; btn.textContent = 'Generating…';
  status.style.display = 'block'; status.textContent = 'Calling the generator — this can take a bit for content + art…';
  try {
    const res = await authFetch('/api/generate-enemy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: document.getElementById('gen-name').value,
        tier: document.getElementById('gen-field-2').value,
        faction: document.getElementById('gen-field-3').value
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Generation failed');
    status.textContent = `Generated: ${data.name} (${data.tier} — ${data.faction})${data.attributeBudgetWarning ? ' — note: ' + data.attributeBudgetWarning : ''}`;
    setTimeout(() => window.location.reload(), 1200);
  } catch (err) {
    status.textContent = 'Error: ' + err.message;
  } finally {
    btn.disabled = false; btn.textContent = 'Generate Enemy';
  }
});
</script>


  <div class="entry-grid" id="entry-grid"></div>
</div>

<footer class="site-footer">
  <div class="wrap">ECHOES OF THE NEON — INTERNAL ARCHIVE BUILD</div>
</footer>

<script src="/config.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/auth.js"></script>
<script src="../js/render.js"></script>
<script>
  requireAuth().then((session) => {
    if (!session) return; // requireAuth already redirected to /login.html
    renderAuthStatus();
    applyCategoryConfig();
    applySiteTheme();
    loadAndRenderCategoryIndex("enemies");
  });
</script>

</body>
</html>
